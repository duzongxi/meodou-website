<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地址管理 - meodou 喵豆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gold': '#C9A962',
                        'gold-light': '#D4B97A',
                        'gold-dark': '#A88B4A',
                        'gray-dark': '#333333',
                        'gray-medium': '#666666',
                        'gray-light': '#999999',
                        'gray-bg': '#F5F5F5',
                    },
                    fontFamily: {
                        'sans': ['Alibaba PuHuiTi', 'Alibaba-PuHuiTi', 'Microsoft YaHei', 'sans-serif'],
                    },
                    fontWeight: {
                        'light': '500',
                        'normal': '500',
                        'medium': '600',
                        'semibold': '700',
                        'bold': '800',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white text-gray-dark font-sans">
    <!-- 导航栏 -->
    <nav class="fixed top-0 left-0 right-0 bg-white/95 backdrop-blur-sm z-50 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <a href="index.html" class="flex items-center space-x-2">
                    <span class="text-2xl font-medium tracking-wider text-gray-dark">meodou</span>
                    <span class="text-2xl font-medium tracking-wider text-gold">喵豆</span>
                </a>
                <div class="hidden md:flex items-center space-x-12">
                    <a href="index.html" class="nav-link text-sm tracking-wide text-gray-medium hover:text-gold transition-colors duration-300">首页</a>
                    <a href="index.html#products" class="nav-link text-sm tracking-wide text-gray-medium hover:text-gold transition-colors duration-300">探索产品</a>
                    <a href="presale.html" class="nav-link text-sm tracking-wide text-gray-medium hover:text-gold transition-colors duration-300">新品预售</a>
                    <a href="member.html" class="nav-link text-sm tracking-wide text-gray-medium hover:text-gold transition-colors duration-300">会员中心</a>
                    <a href="orders.html" class="nav-link text-sm tracking-wide text-gray-medium hover:text-gold transition-colors duration-300">我的订单</a>
                    <a href="address.html" class="nav-link text-sm tracking-wide text-gold transition-colors duration-300">地址管理</a>
                    <a href="customer-service.html" class="nav-link text-sm tracking-wide text-gray-medium hover:text-gold transition-colors duration-300">客户服务</a>
                    <!-- 购物车 -->
                    <button onclick="openCart()" class="relative p-2 text-gray-medium hover:text-gold transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 0a2 2 0 100 4 2 2 0 000-4z"/>
                        </svg>
                        <span id="cart-badge" class="hidden absolute -top-1 -right-1 w-5 h-5 bg-gold text-white text-xs rounded-full flex items-center justify-center">0</span>
                    </button>
                </div>
                <button id="menuBtn" class="md:hidden p-2">
                    <svg class="w-6 h-6 text-gray-dark" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
            <!-- 移动端菜单 -->
            <div id="mobileMenu" class="md:hidden hidden pt-6 pb-4 border-t border-gray-100 mt-4">
                <div class="flex flex-col space-y-6">
                    <a href="index.html" class="nav-link text-sm tracking-widest text-gray-medium hover:text-gold transition-colors uppercase">首页</a>
                    <a href="index.html#products" class="nav-link text-sm tracking-widest text-gray-medium hover:text-gold transition-colors uppercase">探索产品</a>
                    <a href="presale.html" class="nav-link text-sm tracking-widest text-gray-medium hover:text-gold transition-colors uppercase">新品预售</a>
                    <a href="member.html" class="nav-link text-sm tracking-widest text-gray-medium hover:text-gold transition-colors uppercase">会员中心</a>
                    <a href="orders.html" class="nav-link text-sm tracking-widest text-gray-medium hover:text-gold transition-colors uppercase">我的订单</a>
                    <a href="address.html" class="nav-link text-sm tracking-widest text-gold uppercase">地址管理</a>
                    <a href="customer-service.html" class="nav-link text-sm tracking-widest text-gray-medium hover:text-gold transition-colors uppercase">客户服务</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- 页面内容 -->
    <section class="pt-28 pb-20 bg-gray-bg min-h-screen">
        <div class="max-w-4xl mx-auto px-6">
            <div class="mb-8 flex justify-between items-center">
                <div>
                    <h1 class="text-3xl font-light mb-2">地址管理</h1>
                    <p class="text-gray-light">管理您的收货地址</p>
                </div>
                <button onclick="openAddAddressModal()" class="px-6 py-3 bg-gold text-white rounded hover:bg-gold-dark transition-colors">
                    + 新增地址
                </button>
            </div>

            <!-- 地址列表 -->
            <div id="address-list" class="space-y-4">
                <!-- 地址为空提示 -->
                <div id="empty-address" class="bg-white rounded-lg shadow-sm p-12 text-center">
                    <svg class="w-20 h-20 mx-auto mb-4 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    <p class="text-gray-light mb-4">您还没有添加任何收货地址</p>
                    <button onclick="openAddAddressModal()" class="inline-block px-6 py-3 bg-gold text-white rounded hover:bg-gold-dark transition-colors">
                        添加地址
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- 新增地址弹窗 -->
    <div id="add-address-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/50" onclick="closeAddAddressModal()"></div>
        <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-white w-full max-w-lg mx-4 rounded-lg shadow-xl">
            <div class="p-6">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-xl font-light text-gray-dark">新增收货地址</h3>
                    <button onclick="closeAddAddressModal()" class="text-gray-400 hover:text-gray-dark">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                        </svg>
                    </button>
                </div>

                <form id="address-form" class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-medium mb-2">收货人姓名</label>
                        <input type="text" id="address-name" class="w-full px-4 py-3 border border-gray-200 rounded focus:outline-none focus:border-gold" placeholder="请输入收货人姓名">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-medium mb-2">联系电话</label>
                        <input type="tel" id="address-phone" class="w-full px-4 py-3 border border-gray-200 rounded focus:outline-none focus:border-gold" placeholder="请输入联系电话">
                    </div>
                    <div>
                        <label class="block text-sm text-gray-medium mb-2">省份</label>
                        <select id="address-province" class="w-full px-4 py-3 border border-gray-200 rounded focus:outline-none focus:border-gold">
                            <option value="">请选择省份</option>
                            <option value="北京">北京市</option>
                            <option value="上海">上海市</option>
                            <option value="广东">广东省</option>
                            <option value="浙江">浙江省</option>
                            <option value="江苏">江苏省</option>
                            <option value="四川">四川省</option>
                            <option value="湖北">湖北省</option>
                            <option value="湖南">湖南省</option>
                            <option value="福建">福建省</option>
                            <option value="山东">山东省</option>
                            <option value="河南">河南省</option>
                            <option value="河北">河北省</option>
                            <option value="陕西">陕西省</option>
                            <option value="辽宁">辽宁省</option>
                            <option value="吉林">吉林省</option>
                            <option value="黑龙江">黑龙江省</option>
                            <option value="安徽">安徽省</option>
                            <option value="江西">江西省</option>
                            <option value="重庆">重庆市</option>
                            <option value="天津">天津市</option>
                            <option value="山西">山西省</option>
                            <option value="云南">云南省</option>
                            <option value="贵州">贵州省</option>
                            <option value="甘肃">甘肃省</option>
                            <option value="海南">海南省</option>
                            <option value="内蒙古">内蒙古自治区</option>
                            <option value="广西">广西壮族自治区</option>
                            <option value="西藏">西藏自治区</option>
                            <option value="宁夏">宁夏回族自治区</option>
                            <option value="青海">青海省</option>
                            <option value="新疆">新疆维吾尔自治区</option>
                            <option value="台湾">台湾省</option>
                            <option value="香港">香港特别行政区</option>
                            <option value="澳门">澳门特别行政区</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-gray-medium mb-2">详细地址</label>
                        <textarea id="address-detail" class="w-full px-4 py-3 border border-gray-200 rounded focus:outline-none focus:border-gold" rows="3" placeholder="请输入街道、小区、楼栋、门牌号等详细信息"></textarea>
                    </div>
                    <div class="flex items-center">
                        <input type="checkbox" id="address-default" class="mr-2 text-gold">
                        <label for="address-default" class="text-sm text-gray-light">设为默认地址</label>
                    </div>
                    <button type="submit" class="w-full py-4 bg-gold text-white font-medium hover:bg-gold-dark transition-colors rounded">
                        保存地址
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-gray-dark text-white py-12">
        <div class="max-w-7xl mx-auto px-6">
            <div class="flex items-center justify-center mb-8">
                <div class="flex items-center space-x-2">
                    <span class="text-2xl font-light tracking-wider text-white">meodou</span>
                    <span class="text-2xl font-light tracking-wider text-gold">喵豆</span>
                </div>
            </div>
            <div class="border-t border-gray-700 pt-8 text-center">
                <p class="text-gray-600 text-sm">© 2024 meodou 喵豆. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- 购物车弹窗 -->
    <div id="cart-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/50" onclick="closeCart()"></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-md bg-white shadow-xl flex flex-col">
            <div class="flex items-center justify-between p-6 border-b border-gray-100">
                <h3 class="text-xl font-light text-gray-dark">购物车</h3>
                <button onclick="closeCart()" class="text-gray-400 hover:text-gray-dark">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto p-6">
                <div class="text-center text-gray-light py-12">
                    <svg class="w-16 h-16 mx-auto mb-4 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 0a2 2 0 100 4 2 2 0 000-4z"/>
                    </svg>
                    <p>购物车是空的</p>
                </div>
            </div>
            <div class="border-t border-gray-100 p-6">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-gray-medium">合计</span>
                    <span class="text-2xl text-gold font-light" id="cart-total">¥0</span>
                </div>
                <button onclick="checkout()" class="w-full py-4 bg-gold text-white font-medium hover:bg-gold-dark transition-colors">
                    结算
                </button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        // 获取地址列表
        function getAddresses() {
            return JSON.parse(localStorage.getItem('meodou_addresses') || '[]');
        }

        // 保存地址列表
        function saveAddresses(addresses) {
            localStorage.setItem('meodou_addresses', JSON.stringify(addresses));
        }

        // 渲染地址列表
        function renderAddressList() {
            const addresses = getAddresses();
            const addressList = document.getElementById('address-list');
            const emptyAddress = document.getElementById('empty-address');

            if (addresses.length === 0) {
                emptyAddress.classList.remove('hidden');
                return;
            }

            emptyAddress.classList.add('hidden');
            addressList.innerHTML = addresses.map((address, index) => `
                <div class="bg-white rounded-lg shadow-sm p-6 flex justify-between items-start">
                    <div class="flex-1">
                        <div class="flex items-center mb-2">
                            <h4 class="font-medium mr-3">${address.name}</h4>
                            <span class="text-sm text-gray-light">${address.phone}</span>
                            ${address.isDefault ? '<span class="text-xs bg-gold/10 text-gold px-2 py-0.5 rounded ml-2">默认</span>' : ''}
                        </div>
                        <p class="text-gray-light">${address.province} ${address.address}</p>
                    </div>
                    <div class="flex gap-3 ml-4">
                        ${!address.isDefault ? `<button onclick="setDefaultAddress(${index})" class="text-sm text-gray-light hover:text-gold transition-colors">设为默认</button>` : ''}
                        <button onclick="deleteAddress(${index})" class="text-sm text-gray-light hover:text-red-500 transition-colors">删除</button>
                    </div>
                </div>
            `).join('');
        }

        // 打开新增地址弹窗
        function openAddAddressModal() {
            document.getElementById('address-form').reset();
            document.getElementById('add-address-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        // 关闭新增地址弹窗
        function closeAddAddressModal() {
            document.getElementById('add-address-modal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        // 设置默认地址
        function setDefaultAddress(index) {
            let addresses = getAddresses();
            addresses = addresses.map((addr, i) => ({
                ...addr,
                isDefault: i === index
            }));
            saveAddresses(addresses);
            renderAddressList();
        }

        // 删除地址
        function deleteAddress(index) {
            if (!confirm('确定要删除这个地址吗？')) return;
            let addresses = getAddresses();
            const isDefault = addresses[index].isDefault;
            addresses.splice(index, 1);

            // 如果删除的是默认地址，把第一个地址设为默认
            if (isDefault && addresses.length > 0) {
                addresses[0].isDefault = true;
            }

            saveAddresses(addresses);
            renderAddressList();
        }

        // 表单提交
        document.getElementById('address-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const name = document.getElementById('address-name').value.trim();
            const phone = document.getElementById('address-phone').value.trim();
            const province = document.getElementById('address-province').value;
            const address = document.getElementById('address-detail').value.trim();
            const isDefault = document.getElementById('address-default').checked;

            if (!name) {
                alert('请输入收货人姓名');
                return;
            }
            if (!phone) {
                alert('请输入联系电话');
                return;
            }
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                alert('请输入正确的手机号码');
                return;
            }
            if (!province) {
                alert('请选择省份');
                return;
            }
            if (!address) {
                alert('请输入详细地址');
                return;
            }

            let addresses = getAddresses();

            // 如果是第一个地址，或者设为默认，把其他地址的默认去掉
            if (isDefault || addresses.length === 0) {
                addresses = addresses.map(addr => ({ ...addr, isDefault: false }));
            }

            addresses.push({
                name,
                phone,
                province,
                address,
                isDefault: isDefault || addresses.length === 0
            });

            saveAddresses(addresses);
            renderAddressList();
            closeAddAddressModal();
            alert('地址添加成功');
        });

        // 购物车相关函数
        function getCart() {
            const cart = localStorage.getItem('meodou_cart');
            return cart ? JSON.parse(cart) : [];
        }

        function saveCart(cart) {
            localStorage.setItem('meodou_cart', JSON.stringify(cart));
        }

        let cart = getCart();

        function initCartBadge() {
            const cartBadge = document.getElementById('cart-badge');
            if (cartBadge) {
                const totalQty = cart.reduce((sum, item) => sum + item.quantity, 0);
                cartBadge.textContent = totalQty;
                cartBadge.classList.toggle('hidden', totalQty === 0);
            }
        }

        function openCart() {
            cart = getCart();
            updateCartUI();
            document.getElementById('cart-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeCart() {
            document.getElementById('cart-modal').classList.add('hidden');
            document.body.style.overflow = '';
        }

        function updateCartUI() {
            const cartItems = document.getElementById('cart-items');
            const cartTotal = document.getElementById('cart-total');

            const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
            if (cartTotal) cartTotal.textContent = '¥' + total.toLocaleString();

            if (!cartItems) return;

            if (cart.length === 0) {
                cartItems.innerHTML = `
                    <div class="text-center text-gray-light py-12">
                        <svg class="w-16 h-16 mx-auto mb-4 text-gray-200" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 0a2 2 0 100 4 2 2 0 000-4z"/>
                        </svg>
                        <p>购物车是空的</p>
                    </div>
                `;
            } else {
                cartItems.innerHTML = cart.map((item, index) => `
                    <div class="flex gap-4 py-4 border-b border-gray-100">
                        <div class="w-20 h-20 bg-gray-bg flex items-center justify-center rounded">
                            <span class="text-3xl">🐱</span>
                        </div>
                        <div class="flex-1">
                            <h4 class="text-gray-dark font-medium">${item.name}</h4>
                            <p class="text-gray-light text-sm">${item.color}</p>
                            <div class="flex items-center justify-between mt-2">
                                <span class="text-gold">¥${item.price}</span>
                                <div class="flex items-center">
                                    <button onclick="updateCartItem(${index}, -1)" class="w-8 h-8 border border-gray-200 flex items-center justify-center">-</button>
                                    <span class="w-8 text-center">${item.quantity}</span>
                                    <button onclick="updateCartItem(${index}, 1)" class="w-8 h-8 border border-gray-200 flex items-center justify-center">+</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
        }

        function updateCartItem(index, delta) {
            cart = getCart();
            cart[index].quantity += delta;
            if (cart[index].quantity <= 0) {
                cart.splice(index, 1);
            }
            saveCart(cart);
            initCartBadge();
            updateCartUI();
        }

        function checkout() {
            if (cart.length === 0) {
                alert('购物车是空的');
                return;
            }
            window.location.href = 'checkout.html';
        }

        // 移动端菜单
        const menuBtn = document.getElementById('menuBtn');
        const mobileMenu = document.getElementById('mobileMenu');

        if (menuBtn && mobileMenu) {
            menuBtn.addEventListener('click', function() {
                mobileMenu.classList.toggle('hidden');
            });
        }

        // 初始化
        renderAddressList();
        initCartBadge();
    </script>
</body>
</html>
